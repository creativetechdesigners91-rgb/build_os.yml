name: Build Aevox OS (Higher Android 11 Luxury Edition)

on:
  workflow_dispatch:

jobs:
  build-aevox-luxury:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install ISO Modification Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso genisoimage sed curl

    - name: Download High-Speed Stable Android Base
      run: |
        # Pulls a stable, highly optimized 64-bit computer-ready baseline directly into the cloud runner
        curl -L -o base.iso "https://blissos.org"

    - name: Extract Baseline ISO Structures
      run: |
        mkdir -p iso_extracted
        xorriso -osirrox on -indev base.iso -extract / iso_extracted/
        chmod -R +w iso_extracted/

    - name: Inject Custom Aevox OS Branding (Zero Code)
      run: |
        # Hardcodes your "Aevox OS" name directly into the boot menu layouts
        find iso_extracted/ -type f \( -name "*.cfg" -o -name "*.lst" -o -name "*.txt" \) -exec sed -i 's/Bliss/Aevox OS/g' {} +
        find iso_extracted/ -type f \( -name "*.cfg" -o -name "*.lst" -o -name "*.txt" \) -exec sed -i 's/Android/Aevox OS/g' {} +

    - name: Force Premium Multi-Window & Speed Configurations
      run: |
        # Re-packs the default system boot variables to force desktop optimizations on startup
        if [ -f iso_extracted/boot/grub/grub.cfg ]; then
          sed -i 's/quiet/quiet DATA= config_enableHardwareAcceleration=true config_supportsMultiWindow=true config_isLargeScreen=true/g' iso_extracted/boot/grub/grub.cfg
        fi

    - name: Rebuild Branded Aevox Luxury ISO
      run: |
        # Packs your customized folders seamlessly into a bootable PC computer image
        mkisofs -V "AEVOX_OS" -R -b isolinux/isolinux.bin -c isolinux/boot.cat \
          -no-emul-boot -boot-load-size 4 -boot-info-table \
          -eltorito-alt-boot -e boot/grub/efi.img -no-emul-boot \
          -o aevox-os-luxury-11.iso iso_extracted/

    - name: Upload Finished Aevox OS Masterpiece
      uses: actions/upload-artifact@v4
      with:
        name: Aevox-OS-Luxury-11-ISO
        path: aevox-os-luxury-11.iso
        if-no-files-found: error
        retention-days: 3
