name: Build Aevox OS (Blazing Fast Edition)

on:
  workflow_dispatch:

jobs:
  build-aevox-fast:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space (Fixes Premature Kernel Error)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" /usr/share/swift
        sudo docker image prune --all --force
        df -h

    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git gnupg gperf lib32ncurses5-dev lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev \
          libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool \
          squashfs-tools xsltproc zip zlib1g-dev xorriso genisoimage

    - name: Configure GitHub Actions Compiler Ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-aevox-${{ runner.os }}-${{ github.sha }}
        restore-keys: ccache-aevox-${{ runner.os }}-

    - name: Configure Google Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Download Aevox OS Source (Shallow Clone)
      run: |
        git config --global user.name "Aevox OS Developer"
        git config --global user.email "developer@aevox.internal"
        repo init -u https://osdn.net -b android-11.0-r2 --depth=1
        repo sync -c -j$(nproc) --no-tags --no-clone-bundle

    - name: Inject Custom Branding & Speed Tweaks
      run: |
        # 1. Rename bootloader options and system menus to Aevox OS
        sed -i 's/Android-x86/Aevox OS/g' bootable/newinstaller/initrd/init
        sed -i 's/Android-x86/Aevox OS/g' bootable/newinstaller/install.sh
        
        # 2. Force Hardware Rendering, remove animations, and disable sluggish background telemetry
        mkdir -p vendor/aevox/overlay/frameworks/base/core/res/res/values
        cat <<EOF > vendor/aevox/overlay/frameworks/base/core/res/res/values/config.xml
        <resources>
            <bool name="config_enableHardwareAcceleration">true</bool>
            <integer name="config_longPressOnHomeBehavior">0</integer>
            <string name="config_defaultWallpaperComponent">none</string>
            <bool name="config_sf_limitedAlpha">false</bool>
            <integer name="config_lowBatteryWarningLevel">5</integer>
        </resources>
        EOF

    - name: Strip Bloatware to Speed Up Compilation
      run: |
        # Deletes heavy source packages not needed on a blazing fast laptop OS
        rm -rf packages/apps/WallpaperPicker
        rm -rf packages/apps/LiveWallpapersPicker
        rm -rf packages/services/BuiltInPrintService

    - name: Compile High-Speed ISO (LZO Compressed)
      run: |
        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache
        ccache -M 30G
        
        source build/envsetup.sh
        # "-user" target completely removes sluggish background debugging tools
        lunch android_x86_64-user
        
        # "lzo" compression decompresses up to 4x faster during laptop startup than standard zip/xz
        export ISO_CMDS="mksquashfs -comp lzo"
        m -j$(nproc) iso_img
        
        # Package output directly with the Aevox OS moniker
        mv out/target/product/x86_64/*.iso out/target/product/x86_64/aevox-os-blazing-fast.iso

    - name: Upload Finished Aevox OS ISO
      uses: actions/upload-artifact@v4
      with:
        name: Aevox-OS-Blazing-Fast-ISO
        path: out/target/product/x86_64/aevox-os-blazing-fast.iso
        if-no-files-found: error
        retention-days: 3
