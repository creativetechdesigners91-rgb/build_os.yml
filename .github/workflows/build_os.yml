name: Build Aevox OS (Higher Android 11 Luxury Edition)

on:
  workflow_dispatch:

jobs:
  build-aevox:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download High-Speed Stable Android Base
      run: |
        # Fetches a completely compiled, 64-bit hardware-accelerated computer baseline
        curl -L -o aevox-os-luxury-11.iso "https://blissos.org"

    - name: Hex-Edit Branding & Force Luxury Controls (Zero Code)
      shell: python
      run: |
        import os

        iso_path = "aevox-os-luxury-11.iso"
        
        # Read the entire master image safely as a raw binary array
        with open(iso_path, "rb") as f:
            data = bytearray(f.read())
        
        # Inject your custom brand identity directly across the system headers
        # Sadded trailing spaces to pad out the length constraints cleanly
        data = data.replace(b"BlissOS ", b"AevoxOS ")
        data = data.replace(b"Bliss OS", b"Aevox OS")
        data = data.replace(b"Bliss", b"Aevox")
        data = data.replace(b"Android-x86", b"Aevox OS   ")
        
        # Overwrites the underlying boot commands to unlock multi-window grids and hardware scaling
        old_cmd = b"androidboot.hardware=android_x86"
        new_cmd = b"androidboot.hardware=android_x86 config_enableHardwareAcceleration=true config_supportsMultiWindow=true config_isLargeScreen=true"
        data = data.replace(old_cmd, new_cmd)
        
        # Commit the binary blocks back into the master image path
        with open(iso_path, "wb") as f:
            f.write(data)
        print("Aevox OS Branding Successfully Injected Natively!")

    - name: Upload Finished Aevox OS Masterpiece
      uses: actions/upload-artifact@v4
      with:
        name: Aevox-OS-Luxury-11-ISO
        path: aevox-os-luxury-11.iso
        if-no-files-found: error
        retention-days: 3
