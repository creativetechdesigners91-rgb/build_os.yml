name: Build Aevox PC OS

on:
  workflow_dispatch:

jobs:
  build-pc-os:
    # Requires an enterprise-grade self-hosted runner with 350GB+ space and 32GB+ RAM
    runs-on: self-hosted

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install PC Toolchains & Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool \
            libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
            schedtool squashfs-tools xsltproc zip zlib1g-dev x11proto-core-dev \
            g++ mtools syslinux-utils gettext fdisk

      - name: Configure Git
        run: |
          mkdir -p ~/bin
          curl https://googleapis.com > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH
          git config --global user.name "Aevox PC Developer"
          git config --global user.email "pc@aevox.internal"

      - name: Sync Desktop Android Source
        run: |
          mkdir -p ~/aevox_pc && cd ~/aevox_pc
          # Initializing using Bliss OS Android x86 manifest branch
          repo init -u https://github.com -b bliss-v15.x
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Inject Laptop Branding
        run: |
          cd ~/aevox_pc
          # Alter systemic properties to reflect your laptop branding
          sed -i 's/PRODUCT_MODEL :=.*/PRODUCT_MODEL := Aevox Book OS/g' build/make/core/Makefile || true
          if [ -f build/make/core/version_defaults.mk ]; then
            sed -i 's/PLATFORM_DISPLAY_VERSION :=.*/PLATFORM_DISPLAY_VERSION := Aevox PC Pro 1.0/g' build/make/core/version_defaults.mk
          fi

      - name: Compile ISO Image for Laptops
        run: |
          cd ~/aevox_pc
          source build/envsetup.sh
          
          # Target standard 64-bit generic PC layout config
          lunch bliss_x86_64-userdebug
          
          # Build a bootable live ISO file instead of standard smartphone .img chunks
          m iso_img -j$(nproc --all)

      - name: Export Bootable ISO
        uses: actions/upload-artifact@v4
        with:
          name: Aevox-Laptop-ISO
          path: ~/aevox_pc/out/target/product/x86_64/*.iso
