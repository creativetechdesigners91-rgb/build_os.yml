name: Build Aevox PC OS (ARM64 Laptop Edition)

on:
  workflow_dispatch:

jobs:
  build-laptop-os:
    # Requires an enterprise-grade self-hosted runner with 350GB+ space and 32GB+ RAM
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Compilers and Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool \
            libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
            schedtool squashfs-tools xsltproc zip zlib1g-dev fdisk mtools

      - name: Setup Google Repo
        run: |
          mkdir -p ~/bin
          curl https://googleapis.com > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH
          git config --global user.name "Aevox PC Team"
          git config --global user.email "core@aevox.pc"

      - name: Sync Android Source for Tablets/Laptops
        run: |
          mkdir -p ~/aevox_pc && cd ~/aevox_pc
          # Initializing with Android 12L/13/14 which natively supports taskbars and multi-window
          repo init -u https://github.com -b lineage-21.0 --git-lfs
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Inject JioOS/PrimeOS-Style Laptop Architecture
        run: |
          cd ~/aevox_pc
          
          # 1. Branding: Rename System Strings for a Laptop Identity
          sed -i 's/PRODUCT_MODEL :=.*/PRODUCT_MODEL := Aevox Book Pro/g' build/make/core/Makefile || true
          if [ -f build/make/core/version_defaults.mk ]; then
            sed -i 's/PLATFORM_DISPLAY_VERSION :=.*/PLATFORM_DISPLAY_VERSION := Aevox PC OS 1.0/g' build/make/core/version_defaults.mk
          fi

          # 2. Desktop Mode: Force Multi-Window (Freeform) and Taskbar natively on boot
          # This replicates PrimeOS windowing logic by altering the default framework behaviors
          FRAMEWORK_RES="frameworks/base/core/res/res/values/config.xml"
          if [ -f "$FRAMEWORK_RES" ]; then
            # Enable Freeform Window Management globally
            sed -i 's/<bool name="config_freeformWindowManagement">false<\/bool>/<bool name="config_freeformWindowManagement">true<\/bool>/g' $FRAMEWORK_RES
            # Enable support for desktop-style external/large displays
            sed -i 's/<bool name="config_hasRecents">false<\/bool>/<bool name="config_hasRecents">true<\/bool>/g' $FRAMEWORK_RES
          fi

      - name: Compile Target Image
        run: |
          cd ~/aevox_pc
          source build/envsetup.sh
          
          # Change this to your exact MediaTek/Rockchip Laptop motherboard target config tree
          lunch generic_arm64-userdebug
          m target-files-package -j$(nproc --all)

      - name: Upload Aevox PC Images
        uses: actions/upload-artifact@v4
        with:
          name: Aevox-PC-OS-Package
          path: ~/aevox_pc/out/target/product/generic_arm64/*.img
